# ==============================================
# FlexHunter — Shopify App Configuration
# ==============================================
# Docs: https://shopify.dev/docs/apps/tools/cli/configuration

name = "FlexHunter"
client_id = "8d6f0fd3bc4c34cfc17a986eb937e3fa"
application_url = "https://flexhunter.app"
embedded = true

[build]
  automatically_update_urls_on_dev = true

[access_scopes]
  # Only request scopes your app actually uses
  scopes = "read_products,write_products,read_orders"

[auth]
  redirect_urls = [
    "https://flexhunter.app/api/auth/callback"
  ]

[webhooks]
  api_version = "2025-01"

  # Mandatory GDPR compliance webhooks
  [webhooks.privacy_compliance]
    customer_deletion_url = "https://flexhunter.app/api/webhooks/gdpr/customers-redact"
    customer_data_request_url = "https://flexhunter.app/api/webhooks/gdpr/customers-data-request"
    shop_deletion_url = "https://flexhunter.app/api/webhooks/gdpr/shop-redact"

[app_proxy]
  # Not needed — FlexHunter is fully embedded

[pos]
  embedded = false

[app_preferences]
  url = "https://flexhunter.app/settings"
