# ==============================================
# FlexHunter — Shopify App Configuration
# ==============================================
# Docs: https://shopify.dev/docs/apps/tools/cli/configuration

name = "FlexHunter"
client_id = "4fb565e1de535b389ef5bf97fce12be5"
application_url = "https://flexhunter.app"
embedded = true

[build]
  automatically_update_urls_on_dev = true

[access_scopes]
  # Only request scopes your app actually uses
  scopes = "read_products,write_products,read_orders,read_reports"

[auth]
  redirect_urls = [
    "https://flexhunter.app/api/auth/callback"
  ]

[webhooks]
  api_version = "2025-01"

  # Mandatory GDPR compliance webhooks — single endpoint, topic in header
  [[webhooks.subscriptions]]
    compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
    uri = "/api/webhooks/compliance"

[pos]
  embedded = false

[app_preferences]
  url = "https://flexhunter.app/settings"
